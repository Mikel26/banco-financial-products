<section class="form-page">
  <form
    class="product-form"
    [formGroup]="form"
    [attr.aria-busy]="submitting()"
    novalidate
    (ngSubmit)="onSubmit()"
  >
    <h1 class="product-form__title">
      {{ isEdit ? 'Editar Producto' : 'Formulario de Registro' }}
    </h1>

    <div class="product-form__grid">
      <app-text-input
        formControlName="id"
        label="ID"
        [required]="true"
        [errorMessage]="errorFor('id')"
      />
      <app-text-input
        formControlName="name"
        label="Nombre"
        [required]="true"
        [errorMessage]="errorFor('name')"
      />
      <app-text-input
        formControlName="description"
        label="Descripción"
        [required]="true"
        [errorMessage]="errorFor('description')"
      />
      <app-text-input
        formControlName="logo"
        label="Logo"
        [required]="true"
        [errorMessage]="errorFor('logo')"
      />
      <app-date-input
        formControlName="date_release"
        label="Fecha de liberación"
        [required]="true"
        [min]="today"
        [errorMessage]="errorFor('date_release')"
      />
      <app-date-input
        formControlName="date_revision"
        label="Fecha de reestructuración"
        hint="Se calcula automáticamente: un año después de la liberación."
      />
    </div>

    <div class="product-form__actions">
      <app-button type="button" variant="secondary" (clicked)="onReset()"> Reiniciar </app-button>
      <app-button type="submit" [disabled]="!form.valid || submitting()"> Enviar </app-button>
    </div>
  </form>
</section>
