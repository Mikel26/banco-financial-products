<section class="form-page">
  <form class="product-form" [formGroup]="form" (ngSubmit)="onSubmit()">
    <h1 class="product-form__title">
      {{ isEdit ? 'Editar Producto' : 'Formulario de Registro' }}
    </h1>

    <div class="product-form__grid">
      <app-text-input formControlName="id" label="ID" [errorMessage]="errorFor('id')" />
      <app-text-input formControlName="name" label="Nombre" [errorMessage]="errorFor('name')" />
      <app-text-input
        formControlName="description"
        label="Descripción"
        [errorMessage]="errorFor('description')"
      />
      <app-text-input formControlName="logo" label="Logo" [errorMessage]="errorFor('logo')" />
      <app-date-input
        formControlName="date_release"
        label="Fecha de liberación"
        [min]="today"
        [errorMessage]="errorFor('date_release')"
      />
      <app-date-input formControlName="date_revision" label="Fecha de reestructuración" />
    </div>

    <div class="product-form__actions">
      <app-button type="button" variant="secondary" (clicked)="onReset()"> Reiniciar </app-button>
      <app-button type="submit" [disabled]="!form.valid || submitting()"> Enviar </app-button>
    </div>
  </form>
</section>
