<section class="showcase">
  <p class="showcase__note">
    Vitrina temporal de componentes (Fase 2). Se reemplaza por el listado de productos en la Fase 3.
  </p>

  <article class="showcase__group">
    <h2>Botones</h2>
    <div class="showcase__row">
      <app-button (clicked)="registerClick()">Primario</app-button>
      <app-button variant="secondary" (clicked)="registerClick()">Secundario</app-button>
      <app-button variant="ghost" (clicked)="registerClick()">Ghost</app-button>
      <app-button [disabled]="true">Deshabilitado</app-button>
    </div>
    <small>Clicks registrados: {{ clicks() }}</small>
  </article>

  <article class="showcase__group">
    <h2>Campos de formulario (Reactive Forms + CVA)</h2>
    <form [formGroup]="form" class="showcase__form">
      <app-text-input formControlName="name" label="Nombre" placeholder="Escribe un nombre" />
      <app-select formControlName="size" label="Cantidad" [options]="sizeOptions" />
      <app-date-input formControlName="release" label="Fecha de liberación" />
    </form>
    <pre class="showcase__state">{{ form.value | json }}</pre>
  </article>
</section>
